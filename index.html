<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kornelkirschen-Monitor v3.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lg-zoom.min.css" />
    
    <style>
        /* --- ALLGEMEINES LAYOUT --- */
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* --- SIDEBAR / TOPBAR OBEN LINKS --- */
        .sidebar-info {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 10px; border: 2px solid #333;
            box-shadow: 4px 4px 0px #333;
            max-width: 300px;
        }

        @media (max-width: 600px) {
            .sidebar-info { top: 5px; left: 5px; right: 5px; max-width: none; padding: 8px; }
            .sidebar-info h2 { font-size: 16px; }
            .sidebar-info p { font-size: 13px; margin: 3px 0; }
        }

        /* --- POPUPS AUF DER KARTE --- */
        .custom-popup { font-size: 16px; width: 280px; text-align: center; }
        .custom-popup b { display: block; margin-bottom: 5px; text-transform: capitalize; }
        .custom-popup img { 
            width: 100%; height: 200px; object-fit: cover; 
            border-radius: 8px; cursor: pointer; margin-bottom: 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .custom-popup button { 
            color: white; border: none; padding: 10px; width: 100%; 
            cursor: pointer; margin-top: 10px; font-weight: bold; border-radius: 4px;
        }

        /* --- MARKER & FOOTER --- */
        .cherry-emoji-marker { font-size: 24px; display: flex; justify-content: center; align-items: center; }
        
        .footer-links {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            font-size: 12px; background: rgba(255,255,255,0.8); padding: 5px 8px;
            border-radius: 4px; border: 1px solid #ccc;
        }
        .footer-links a { color: #333; text-decoration: none; cursor: pointer; font-weight: bold; }

        /* --- LADE-SPINNER --- */
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(39, 174, 96, 0.3);
            border-radius: 50%; border-top-color: #27ae60;
            animation: spin 1s ease-in-out infinite; margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- BUTTON-STEUERUNG (ZOOM & GPS) --- */

        /* GPS Button Styling (wieder schick machen) */
        .leaflet-control-locate {
            background: white;
            width: 34px;
            height: 34px;
            line-height: 34px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            border-radius: 5px;
            border: 2px solid rgba(0,0,0,0.2);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* A) DESKTOP ANSICHT */
        @media (min-width: 769px) {
            .leaflet-control-locate {
                position: absolute !important;
                bottom: 20px !important;
                right: 10px !important;
            }
            .leaflet-control-zoom { 
                margin-bottom: 70px !important; 
            }
        }

        /* B) MOBILE ANSICHT (Handys) */
        @media (max-width: 768px) {
            /* GPS Button über die Zoom Buttons setzen */
            .leaflet-control-locate {
                position: fixed !important;
                bottom: 110px !important; /* Über dem Zoom-In (+) Button */
                right: 12px !important;
                z-index: 1001;
            }
            /* Zoom Buttons bleiben rechts unten */
            .leaflet-bottom.leaflet-right .leaflet-control-zoom {
                margin-bottom: 20px !important;
                margin-right: 12px !important;
            }
            /* Footer-Links links lassen */
            .footer-links {
                bottom: 10px !important;
                left: 10px !important;
                max-width: 60%;
            }
            /* Leaflet Info ausblenden für Platz */
            .leaflet-control-attribution { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar-info">
        <h2 style="margin:0">🍒 Kornelkirschen-Map</h2>
        <p>Klicke auf die Karte zum Eintragen.</p>
        <p id="counter" onclick="cherryMagic()" style="font-weight: bold; color: #27ae60; cursor: pointer;">
            <span class="spinner"></span> Lade Standorte...
        </p>
    </div>

    <div id="map"></div>
    <div class="footer-links">
        <a onclick="openAbout()">Über das Projekt</a> | 
        <a onclick="openImpressum()" oncontextmenu="checkAdminStatusManual(event)">Impressum & Datenschutz</a>
        <span id="admin-logout-link" style="display:none;"> | <a onclick="adminLogout()" style="color: #e74c3c;">Abmelden</a></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        // --- 1. SETUP ---
        const SUPABASE_URL = 'https://kiorpmxzdjkpiihoixzk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Rbiv_1ArwwN40lR9fGDD7g_iJlhHCn2';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. ADMIN-LOGIK ---
        function binIchAdmin() { return localStorage.getItem('istAdmin') === 'true'; }
        
        function checkAdminStatusManual(event) {
            event.preventDefault(); 
            const eingabe = prompt("Admin-Sperre: Bitte Passwort eingeben:");
            if (eingabe) {
                const hashEingabe = CryptoJS.SHA256(eingabe.trim()).toString();
                const korrekterHash = "ca3b43fcb382fb262d183a3e8a1121a040d77e634d5041e18d26d8e0555417cd";
                if (hashEingabe === korrekterHash) {
                    localStorage.setItem('istAdmin', 'true');
                    alert("Willkommen zurück, Admin! 🍒");
                    location.reload(); 
                } else { alert("Zugriff verweigert."); }
            }
        }

        // --- 3. KARTEN SETUP ---
        const lastPos = JSON.parse(localStorage.getItem('lastPos')) || { lat: 52.5200, lng: 13.4050, zoom: 13 };
        const map = L.map('map', { zoomControl: false }).setView([lastPos.lat, lastPos.lng], lastPos.zoom);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Custom GPS Button hinzufügen
        const CustomLocate = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function() {
                const div = L.DomUtil.create('div', 'leaflet-control-locate');
                div.innerHTML = '📍';
                div.title = "Mein Standort";
                div.onclick = function(e) {
                    e.stopPropagation();
                    locateMe();
                };
                return div;
            }
        });
        map.addControl(new CustomLocate());

        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: 'Google'
        }).addTo(map);

        map.on('moveend', function() {
            const center = map.getCenter();
            localStorage.setItem('lastPos', JSON.stringify({ lat: center.lat, lng: center.lng, zoom: map.getZoom() }));
        });

        const cherryIcon = L.divIcon({
            html: '🍒', className: 'cherry-emoji-marker', iconSize: [30, 30], iconAnchor: [15, 15]
        });

        // --- 4. MARKER & LADEN ---
        function addMarkerToMap(s) {
            let popupContent = `<div class="custom-popup"><b>${s.art}</b>`;
            if (s.entdecker) { popupContent += `<i style="font-size:12px; color:gray;">Entdeckt von: ${s.entdecker}</i>`; }
            let bListe = s.fotos || [];
            if (bListe.length === 0 && s.foto_url) { bListe = [s.foto_url]; }
            bListe.forEach(url => {
                popupContent += `<div class="popup-gallery" data-src="${url}"><img src="${url}" alt="${s.art}"></div>`;
            });
            popupContent += `<button onclick="openPhotoUpload(${s.id})" style="background:#27ae60; margin-top:10px;">📷 Foto nachreichen</button>`;
            if (binIchAdmin()) { popupContent += `<button onclick="deleteSichtung(${s.id})" style="background:#e74c3c;">🗑️ Eintrag löschen</button>`; }
            popupContent += `</div>`;
            L.marker([s.lat, s.lng], { icon: cherryIcon, sichtungId: s.id }).addTo(map).bindPopup(popupContent);
        }

        async function loadSichtungen() {
            const counterElement = document.getElementById('counter');
            // Spinner zeigen beim Start
            counterElement.innerHTML = '<span class="spinner"></span> Suche Kirschen...';
            
            const { data, error, count } = await supabaseClient.from('sichtungen').select('*', { count: 'exact' });
            
            if (!error && data) { 
                map.eachLayer(layer => { if (layer instanceof L.Marker && layer.options.sichtungId) map.removeLayer(layer); });
                data.forEach(s => addMarkerToMap(s)); 
                // Spinner erst jetzt entfernen
                counterElement.innerText = `Aktuell ${count || 0} Standorte markiert`; 
            } else {
                counterElement.innerText = "Fehler beim Laden";
            }
        }
        loadSichtungen();

        map.on('popupopen', function() {
            const galleryElements = document.querySelectorAll('.popup-gallery');
            galleryElements.forEach(el => { if(window.lightGallery) { lightGallery(el, { plugins: [lgZoom], speed: 500, download: false }); } });
        });

        // --- 5. NEUER EINTRAG ---
        map.on('click', function(e) {
            const lat = e.latlng.lat; const lng = e.latlng.lng;
            const gespeicherterName = localStorage.getItem('entdeckerName') || '';
            const formHtml = `
                <div class="custom-popup" style="text-align: left;">
                    <h3 style="margin-top:0;">Sichtung eintragen</h3>
                    <label style="font-size:12px; color:#666;">Entdecker:</label>
                    <input type="text" id="entdecker-input" value="${gespeicherterName}" placeholder="Dein Name (optional)" style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
                    <label style="font-size:12px; color:#666;">Größe des Bestands:</label>
                    <select id="size" style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
                        <option value="sträuchchen">Sträuchchen</option><option value="strauch">Strauch</option><option value="heckenpflanze">Heckenpflanze</option><option value="hochstrauch">Hochstrauch</option><option value="baum">Baum</option>
                    </select>
                    <label style="font-size:12px; color:#666;">Fotos hinzufügen:</label>
                    <input type="file" id="photo-input" accept="image/*" onchange="previewFile()" multiple style="width:100%; margin-bottom:10px;">
                    <div id="photo-input-preview" style="margin-bottom:10px;"></div>
                    <p style="font-size: 10px; color: #7f8c8d; line-height: 1.2; margin-bottom: 12px; border-top: 1px solid #eee; padding-top: 8px;">
                        Hinweis: Mit dem Speichern erklärst du dich einverstanden, dass Standort, Name und Foto öffentlich auf der Karte angezeigt werden.
                    </p>
                    <button id="save-btn" onclick="saveAll(${lat}, ${lng})" style="background:#2c3e50; color:white; width:100%; padding:12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Speichern</button>
                </div>`;
            L.popup().setLatLng(e.latlng).setContent(formHtml).openOn(map);
        });

        function previewFile() {
            const previewContainer = document.getElementById('photo-input-preview');
            const files = document.getElementById('photo-input').files;
            previewContainer.innerHTML = ''; previewContainer.style.display = 'flex';
            if (files) {
                [...files].forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const img = document.createElement('img');
                        img.src = reader.result; img.style.width = '60px'; img.style.height = '60px'; 
                        img.style.objectFit = 'cover'; img.style.borderRadius = '4px'; img.style.margin = '2px';
                        previewContainer.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        async function saveAll(lat, lng) {
            const btn = document.getElementById('save-btn');
            const files = document.getElementById('photo-input').files;
            localStorage.setItem('entdeckerName', document.getElementById('entdecker-input').value);
            btn.disabled = true;
            let finalImageUrls = [];
            for (let i = 0; i < files.length; i++) {
                btn.innerText = `Bild ${i + 1}/${files.length}...`;
                await new Promise(r => setTimeout(r, 50)); 
                const resizedBlob = await resizeImage(files[i], 1600, 1600);
                const fileName = Date.now() + "_" + Math.floor(Math.random() * 1000000) + ".jpg";
                const { error } = await supabaseClient.storage.from('pflanzenfotos').upload(fileName, resizedBlob);
                if (!error) {
                    const { data } = supabaseClient.storage.from('pflanzenfotos').getPublicUrl(fileName);
                    finalImageUrls.push(data.publicUrl);
                }
            }
            btn.innerText = "Speichere...";
            const { error: dbError } = await supabaseClient.from('sichtungen').insert([{ 
                lat, lng, art: document.getElementById('size').value, 
                entdecker: localStorage.getItem('entdeckerName'), 
                fotos: finalImageUrls, foto_url: finalImageUrls[0] || null 
            }]);
            if (!dbError) { alert("Gespeichert! 🍒"); map.closePopup(); loadSichtungen(); }
            else { alert("Fehler!"); btn.disabled = false; btn.innerText = "Speichern"; }
        }

        function openPhotoUpload(id) {
            const uploadHtml = `<div class="custom-popup"><h3>Fotos nachreichen</h3><input type="file" id="extra-photo-input" accept="image/*" multiple><br><br><button id="extra-save-btn" onclick="uploadExtraPhotos(${id})" style="background:#27ae60;">Hochladen</button></div>`;
            L.popup().setLatLng(map.getCenter()).setContent(uploadHtml).openOn(map);
        }

        async function uploadExtraPhotos(id) {
            const btn = document.getElementById('extra-save-btn');
            const files = document.getElementById('extra-photo-input').files;
            if (files.length === 0) return;
            btn.disabled = true;
            try {
                const { data: sichtung } = await supabaseClient.from('sichtungen').select('fotos').eq('id', id).single();
                let currentPhotos = sichtung.fotos || [];
                for (let i = 0; i < files.length; i++) {
                    btn.innerText = `Bild ${i + 1}/${files.length}...`;
                    const resizedBlob = await resizeImage(files[i], 1600, 1600);
                    const fileName = Date.now() + "_" + Math.floor(Math.random() * 1000000) + ".jpg";
                    const { error } = await supabaseClient.storage.from('pflanzenfotos').upload(fileName, resizedBlob);
                    if (!error) {
                        const { data } = supabaseClient.storage.from('pflanzenfotos').getPublicUrl(fileName);
                        currentPhotos.push(data.publicUrl);
                    }
                }
                await supabaseClient.from('sichtungen').update({ fotos: currentPhotos }).eq('id', id);
                alert("Erfolgreich! 🍒"); map.closePopup(); loadSichtungen();
            } catch (e) { alert("Fehler!"); btn.disabled = false; }
        }

        async function deleteSichtung(id) {
            if (confirm("Wirklich löschen?")) {
                const { error } = await supabaseClient.from('sichtungen').delete().eq('id', id);
                if (!error) { map.closePopup(); loadSichtungen(); }
            }
        }

        function resizeImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                        else { if (h > maxHeight) { w *= maxHeight / h; h = maxHeight; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(b => resolve(b), 'image/jpeg', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function locateMe() { map.locate({setView: true, maxZoom: 16}); }
        map.on('locationfound', (e) => { 
            L.circle(e.latlng, {radius: e.accuracy/2}).addTo(map).bindPopup("Du bist hier").openPopup(); 
        });

        function openImpressum() {
            const legalHtml = `<div style="text-align: left; max-height: 400px; overflow-y: auto; padding: 15px; line-height: 1.5; font-size: 13px;"><h2 style="margin-top:0; color: #27ae60;">Impressum & Datenschutz</h2><p><b>Verantwortlich:</b><br>Oliver Gluschke<br>Prenzlauer Promenade 177<br>13189 Berlin<br>E-Mail: ogluschke@web.de</p><hr style="border:0; border-top:1px solid #eee; margin:15px 0;"><h3 style="color:#27ae60;">Datenschutzerklärung</h3><p>Diese App ist ein privates Projekt zur Dokumentation von Kornelkirschen. Die Nutzung erfolgt freiwillig.</p><p><b>1. Hosting & Infrastruktur</b><br>Gehostet bei <b>GitHub Pages</b> und <b>Netlify</b>.</p><p><b>2. Datenbank & Medien</b><br>Speicherung bei <b>Supabase</b>.</p><p><b>3. Kartendienst</b><br>Kartenkacheln von <b>Google Maps</b>.</p></div>`;
            L.popup().setLatLng(map.getCenter()).setContent(legalHtml).openOn(map);
        }

        function openAbout() {
            const aboutHtml = `<div style="text-align: left; max-height: 400px; overflow-y: auto; padding: 15px; line-height: 1.5;"><img src="about-bild.jpg" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;" alt="Kornelkirsche"><h2 style="margin-top:0; color: #27ae60;">Über den Monitor 🍒</h2><p>Die Kornelkirsche ist eine wichtige Nahrungsquelle für Insekten im Vorfrühling. Im Gegensatz zur Forsythie liefert sie Nektar und Pollen.</p></div>`;
            L.popup().setLatLng(map.getCenter()).setContent(aboutHtml).openOn(map);
        }

        function updateAdminUI() {
            const logoutLink = document.getElementById('admin-logout-link');
            if (logoutLink && binIchAdmin()) { logoutLink.style.display = 'inline'; }
        }
        function adminLogout() { if (confirm("Abmelden?")) { localStorage.removeItem('istAdmin'); location.reload(); } }
        updateAdminUI();

        function cherryMagic() {
            const text = document.getElementById('counter').innerText;
            alert("Du hast schon " + text + " gefunden! Weiter so! 🍒✨");
        }
    </script>
</body>
</html>
