<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kornelkirschen-Monitor v3.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lg-zoom.min.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .sidebar-info {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 10px; border: 2px solid #333;
            box-shadow: 4px 4px 0px #333;
            max-width: 300px;
        }

        .gps-btn {
            position: absolute; bottom: 20px; right: 10px; z-index: 1000;
            background: white; border: 2px solid #333; cursor: pointer; 
            border-radius: 4px; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }

        @media (max-width: 600px) {
            .sidebar-info { top: 5px; left: 5px; right: 5px; max-width: none; padding: 8px; }
            .sidebar-info h2 { font-size: 16px; }
            .sidebar-info p { font-size: 13px; margin: 3px 0; }
        }

        .custom-popup { font-size: 16px; width: 280px; text-align: center; }
        .custom-popup b { display: block; margin-bottom: 5px; text-transform: capitalize; }
        .custom-popup img { 
            width: 100%; height: 200px; object-fit: cover; 
            border-radius: 8px; cursor: pointer; margin-bottom: 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .custom-popup button { 
            color: white; border: none; padding: 10px; width: 100%; 
            cursor: pointer; margin-top: 10px; font-weight: bold; border-radius: 4px;
        }

        .cherry-emoji-marker { font-size: 24px; display: flex; justify-content: center; align-items: center; }
        .footer-links {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            font-size: 12px; background: rgba(255,255,255,0.7); padding: 2px 5px;
            border-radius: 3px;
        }
        .footer-links a { color: #333; text-decoration: none; cursor: pointer; }

        .leaflet-bottom.leaflet-right .leaflet-control-zoom { margin-bottom: 70px; }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(39, 174, 96, 0.3);
            border-radius: 50%; border-top-color: #27ae60;
            animation: spin 1s ease-in-out infinite; margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #photo-input-preview { display: none; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="sidebar-info">
        <h2 style="margin:0">🍒 Kornelkirschen-Map</h2>
        <p>Klicke auf die Karte zum Eintragen.</p>
        <p id="counter" onclick="cherryMagic()" style="font-weight: bold; color: #27ae60; cursor: pointer;">Lade Standorte...</p>
    </div>

    <div id="map"></div>
    <div class="gps-btn" onclick="locateMe()" title="Mein Standort">📍</div>

    <div class="footer-links">
    <a onclick="openAbout()">Über das Projekt</a> | 
    <a onclick="openImpressum()" oncontextmenu="checkAdminStatusManual(event)">Impressum & Datenschutz</a>
    <span id="admin-logout-link" style="display:none;"> | <a onclick="adminLogout()" style="color: #e74c3c;">Abmelden</a></span>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        // --- 1. SETUP ---
        const SUPABASE_URL = 'https://kiorpmxzdjkpiihoixzk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Rbiv_1ArwwN40lR9fGDD7g_iJlhHCn2';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. ADMIN-LOGIK ---
        function checkAdminStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('login')) {
                const eingabe = prompt("Bitte Admin-Passwort eingeben:");
                if (eingabe) {
                    const hashEingabe = CryptoJS.SHA256(eingabe.trim()).toString();
                    const korrekterHash = "ca3b43fcb382fb262d183a3e8a1121a040d77e634d5041e18d26d8e0555417cd";
                    if (hashEingabe === korrekterHash) {
                        localStorage.setItem('istAdmin', 'true');
                        alert("ERFOLG! Admin-Modus aktiviert. 🍒");
                    } else {
                        alert("FALSCH!");
                    }
                }
                window.location.href = window.location.pathname; 
            }
        }
        checkAdminStatus();

        function binIchAdmin() { return localStorage.getItem('istAdmin') === 'true'; }

        function checkAdminStatusManual(event) {
            event.preventDefault(); 
            const eingabe = prompt("Admin-Sperre: Bitte Passwort eingeben:");
            if (eingabe) {
                const hashEingabe = CryptoJS.SHA256(eingabe.trim()).toString();
                const korrekterHash = "ca3b43fcb382fb262d183a3e8a1121a040d77e634d5041e18d26d8e0555417cd";
                if (hashEingabe === korrekterHash) {
                    localStorage.setItem('istAdmin', 'true');
                    alert("Willkommen zurück, Admin! 🍒");
                    location.reload(); 
                } else {
                    alert("Zugriff verweigert.");
                }
            }
        }

        // --- 3. KARTEN SETUP ---
        // Letzte Position aus Speicher laden oder Standard (Berlin)
        const lastPos = JSON.parse(localStorage.getItem('lastPos')) || { lat: 52.5200, lng: 13.4050, zoom: 13 };
        
        const map = L.map('map', { zoomControl: false }).setView([lastPos.lat, lastPos.lng], lastPos.zoom);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: 'Google'
        }).addTo(map);

        // Jedes Mal wenn die Karte bewegt wird: Position merken
        map.on('moveend', function() {
            const center = map.getCenter();
            localStorage.setItem('lastPos', JSON.stringify({ 
                lat: center.lat, 
                lng: center.lng, 
                zoom: map.getZoom() 
            }));
        });

        const cherryIcon = L.divIcon({
            html: '🍒', className: 'cherry-emoji-marker', iconSize: [30, 30], iconAnchor: [15, 15]
        });

        // --- 4. MARKER & LADEN ---
        function addMarkerToMap(s) {
            let popupContent = `<div class="custom-popup"><b>${s.art}</b>`;
            if (s.entdecker) { popupContent += `<i style="font-size:12px; color:gray;">Entdeckt von: ${s.entdecker}</i>`; }
            let bListe = s.fotos || [];
            if (bListe.length === 0 && s.foto_url) { bListe = [s.foto_url]; }
            bListe.forEach(url => {
                popupContent += `<div class="popup-gallery" data-src="${url}"><img src="${url}" alt="${s.art}"></div>`;
            });
            popupContent += `<button onclick="openPhotoUpload(${s.id})" style="background:#27ae60; margin-top:10px;">📷 Foto nachreichen</button>`;
            if (binIchAdmin()) { popupContent += `<button onclick="deleteSichtung(${s.id})" style="background:#e74c3c;">🗑️ Eintrag löschen</button>`; }
            popupContent += `</div>`;
            L.marker([s.lat, s.lng], { icon: cherryIcon, sichtungId: s.id }).addTo(map).bindPopup(popupContent);
        }

        async function loadSichtungen() {
            const counterElement = document.getElementById('counter');
            if (counterElement) { counterElement.innerHTML = '<span class="spinner"></span> Suche Kirschen...'; }
            const { data, error, count } = await supabaseClient.from('sichtungen').select('*', { count: 'exact' });
            if (!error && data) { 
                map.eachLayer(layer => { if (layer instanceof L.Marker && layer.options.sichtungId) map.removeLayer(layer); });
                data.forEach(s => addMarkerToMap(s)); 
                if (counterElement) { counterElement.innerText = `Aktuell ${count || 0} Standorte markiert`; }
            }
        }
        loadSichtungen();

        map.on('popupopen', function() {
            const galleryElements = document.querySelectorAll('.popup-gallery');
            galleryElements.forEach(el => { if(window.lightGallery) { lightGallery(el, { plugins: [lgZoom], speed: 500, download: false }); } });
        });

        // --- 5. NEUER EINTRAG ---
        map.on('click', function(e) {
            const lat = e.latlng.lat; const lng = e.latlng.lng;
            const gespeicherterName = localStorage.getItem('entdeckerName') || '';
            const formHtml = `
                <div class="custom-popup">
                    <h3>Sichtung eintragen</h3>
                    <input type="text" id="entdecker-input" value="${gespeicherterName}" placeholder="Dein Name (optional)"><br><br>
                    <select id="size">
                        <option value="sträuchchen">Sträuchchen</option>
                        <option value="strauch">Strauch</option>
                        <option value="heckenpflanze">Heckenpflanze</option>
                        <option value="hochstrauch">Hochstrauch</option>
                        <option value="baum">Baum</option>
                    </select><br><br>
                    <input type="file" id="photo-input" accept="image/*" onchange="previewFile()" multiple><br>
                    <div id="photo-input-preview"></div>
                    <button id="save-btn" onclick="saveAll(${lat}, ${lng})" style="background:#2c3e50;">Speichern</button>
                </div>`;
            L.popup().setLatLng(e.latlng).setContent(formHtml).openOn(map);
        });

        function previewFile() {
            const previewContainer = document.getElementById('photo-input-preview');
            const files = document.getElementById('photo-input').files;
            previewContainer.innerHTML = ''; previewContainer.style.display = 'flex';
            if (files && files.length > 0) {
                [...files].forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const img = document.createElement('img');
                        img.src = reader.result; img.style.width = '60px'; img.style.height = '60px'; 
                        img.style.objectFit = 'cover'; img.style.borderRadius = '4px'; img.style.border = '1px solid #ddd';
                        previewContainer.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        async function saveAll(lat, lng) {
            const btn = document.getElementById('save-btn');
            const files = document.getElementById('photo-input').files;
            localStorage.setItem('entdeckerName', document.getElementById('entdecker-input').value);
            btn.disabled = true;
            let finalImageUrls = [];
            for (let i = 0; i < files.length; i++) {
                btn.innerText = `Bild ${i + 1}/${files.length}...`;
                // Text-Refresh erzwingen
                await new Promise(r => setTimeout(r, 50)); 
                const resizedBlob = await resizeImage(files[i], 1600, 1600);
                const fileName = Date.now() + "_" + Math.floor(Math.random() * 1000000) + ".jpg";
                const { error } = await supabaseClient.storage.from('pflanzenfotos').upload(fileName, resizedBlob);
                if (!error) {
                    const { data } = supabaseClient.storage.from('pflanzenfotos').getPublicUrl(fileName);
                    finalImageUrls.push(data.publicUrl);
                }
            }
            btn.innerText = "Speichere...";
            const { error: dbError } = await supabaseClient.from('sichtungen').insert([{ 
                lat, lng, art: document.getElementById('size').value, 
                entdecker: localStorage.getItem('entdeckerName'), 
                fotos: finalImageUrls, foto_url: finalImageUrls[0] || null 
            }]);
            if (!dbError) { alert("Gespeichert! 🍒"); map.closePopup(); loadSichtungen(); }
            else { alert("Fehler!"); btn.disabled = false; btn.innerText = "Speichern"; }
        }

        // --- 6. FOTOS NACHREICHEN ---
        function openPhotoUpload(id) {
            const uploadHtml = `
                <div class="custom-popup">
                    <h3>Fotos nachreichen</h3>
                    <input type="file" id="extra-photo-input" accept="image/*" multiple><br><br>
                    <button id="extra-save-btn" onclick="uploadExtraPhotos(${id})" style="background:#27ae60;">Hochladen</button>
                </div>`;
            L.popup().setLatLng(map.getCenter()).setContent(uploadHtml).openOn(map);
        }

        async function uploadExtraPhotos(id) {
            const btn = document.getElementById('extra-save-btn');
            const files = document.getElementById('extra-photo-input').files;
            if (files.length === 0) return;
            btn.disabled = true;
            try {
                const { data: sichtung } = await supabaseClient.from('sichtungen').select('fotos').eq('id', id).single();
                let currentPhotos = sichtung.fotos || [];
                for (let i = 0; i < files.length; i++) {
                    btn.innerText = `Bild ${i + 1}/${files.length}...`;
                    await new Promise(r => setTimeout(r, 50)); 
                    const resizedBlob = await resizeImage(files[i], 1600, 1600);
                    const fileName = Date.now() + "_" + Math.floor(Math.random() * 1000000) + ".jpg";
                    const { error } = await supabaseClient.storage.from('pflanzenfotos').upload(fileName, resizedBlob);
                    if (!error) {
                        const { data } = supabaseClient.storage.from('pflanzenfotos').getPublicUrl(fileName);
                        currentPhotos.push(data.publicUrl);
                    }
                }
                await supabaseClient.from('sichtungen').update({ fotos: currentPhotos }).eq('id', id);
                alert("Erfolgreich! 🍒"); map.closePopup(); loadSichtungen();
            } catch (e) { alert("Fehler!"); btn.disabled = false; }
        }

        // --- 7. HELPER & LÖSCHEN ---
        async function deleteSichtung(id) {
            if (confirm("Wirklich löschen?")) {
                const { error } = await supabaseClient.from('sichtungen').delete().eq('id', id);
                if (!error) { map.closePopup(); loadSichtungen(); }
            }
        }

        function resizeImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                        else { if (h > maxHeight) { w *= maxHeight / h; h = maxHeight; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(b => resolve(b), 'image/jpeg', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function locateMe() { map.locate({setView: true, maxZoom: 16}); }
        map.on('locationfound', (e) => { L.circle(e.latlng, {radius: e.accuracy/2}).addTo(map).bindPopup("Du bist hier").openPopup(); });

        function openImpressum() {
            const impressumHtml = `<div style="text-align: left; padding: 10px;"><h3>Impressum</h3><p>Oliver Gluschke<br>Prenzlauer Promenade 177<br>13189 Berlin</p></div>`;
            L.popup().setLatLng(map.getCenter()).setContent(impressumHtml).openOn(map);
        }

function openAbout() {
    const aboutHtml = `
        <div style="text-align: left; max-height: 400px; overflow-y: auto; padding: 15px; line-height: 1.5;">
            <img src="about-bild.jpg" 
            style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;" 
            alt="Blühende Kornelkirsche">

            <h2 style="margin-top:0; color: #27ae60;">Über den Kornelkirschen-Monitor 🍒</h2>
            
            <p><b>Warum diese App?</b><br>
            Vielleicht ist es dir auch schon aufgefallen: Im Vorfrühling leuchten unsere Gärten und Parks überall knallgelb. Meistens ist das die Forsythie. Sie sieht prächtig aus, verbirgt aber ein ökologisches Geheimnis: Für unsere Insektenwelt ist sie so nützlich wie eine Plastikblume, da sie weder Pollen noch Nektar bietet.</p>
            
            <p><b>Die Heldin im Hintergrund: Die Kornelkirsche (Cornus mas)</b><br>
            Fast zur gleichen Zeit blüht ein heimisches Wunderwerk ebenfalls in leuchtendem Gelb: die Kornelkirsche. Im Gegensatz zur Forsythie ist sie ein echtes Buffet für die Natur. Als eine der ersten Nahrungsquellen im Jahr liefert sie wertvollen Nektar für früh fliegende Wildbienen und Hummeln. Später im Jahr trägt sie Früchte, die nicht nur Vögeln schmecken, sondern auch für uns Menschen essbar und gesund sind. Doch leider wird sie oft von der sterilen Forsythie verdrängt.</p>
            
            <p><b>Unsere Mission</b><br>
            Der Kornelkirschen-Monitor ist ein Herzensprojekt für alle, denen Biodiversität und Artenschutz wichtig sind. Wir möchten:</p>
            <ul style="padding-left: 20px; margin-top: 0;">
                <li><b>Sichtbarkeit schaffen:</b> Wo wachsen sie noch, die echten Kornelkirschen?</li>
                <li><b>Wissen teilen:</b> Damit dieser wertvolle Strauch wieder einen festen Platz in unseren Köpfen und Gärten findet.</li>
                <li><b>Gemeinsam dokumentieren:</b> Hilf mit, Standorte einzutragen, um eine lebendige Landkarte unserer Natur zu weben.</li>
            </ul>
            
            <p>Egal ob du Standorte für die Ernte suchst, Setzlinge ziehen willst (bitte immer geltendes Naturschutzrecht beachten!) oder einfach nur neugierig bist:</p>

            <p style="font-weight: bold; text-align: center;">Schön, dass du dabei bist! 🍒✨</p>

            <p style="font-style: italic; font-size: 11px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 15px; color: #666;">
                Ein kleiner technischer Hinweis: Dieses Projekt wurde von einem Naturfreund ohne vorherige Coding-Erfahrung ins Leben gerufen – erstellt mit der kreativen und technischen Unterstützung der KI Gemini. Ein Beweis dafür, dass Technik dabei helfen kann, unsere echte Umwelt besser zu verstehen.
            </p>
        </div>
    `;
    L.popup().setLatLng(map.getCenter()).setContent(aboutHtml).openOn(map);
}

        function updateAdminUI() {
            const logoutLink = document.getElementById('admin-logout-link');
            if (logoutLink && binIchAdmin()) { logoutLink.style.display = 'inline'; }
        }
        function adminLogout() { if (confirm("Abmelden?")) { localStorage.removeItem('istAdmin'); location.reload(); } }
        updateAdminUI();

        function cherryMagic() {
    // 1. Wir holen uns die aktuelle Anzahl aus dem Text
    const text = document.getElementById('counter').innerText;
    
    // 2. Wir schicken eine kleine Nachricht ab
    alert("Du hast schon " + text + " gefunden! Weiter so! 🍒✨");
    
    // 3. Ein kleiner Log-Eintrag für uns Entwickler (F12 Konsole)
    console.log("Die Kirsch-Magie wurde aktiviert!");
}
    </script>
</body>
</html>
